---
- name: Common setup for all nodes (CentOS 9)
  hosts: all
  become: yes
  tasks:
    - name: Update system
      dnf:
        name: "*"
        state: latest
        update_only: yes

    - name: Install required packages
      dnf:
        name:
          - yum-utils
          - curl
          - iptables
          - iproute
          - net-tools
          - firewalld
        state: present

    - name: Enable firewalld
      systemd:
        name: firewalld
        enabled: yes
        state: started

    - name: Disable swap
      command: swapoff -a

    - name: Remove swap from fstab
      lineinfile:
        path: /etc/fstab
        regexp: 'swap'
        state: absent

    - name: Load kernel modules
      command: modprobe {{ item }}
      loop:
        - overlay
        - br_netfilter
      changed_when: false

    - name: Make kernel modules persistent
      copy:
        content: |
          overlay
          br_netfilter
        dest: /etc/modules-load.d/k8s.conf
        mode: '0644'

    - name: Create sysctl config
      copy:
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1
        dest: /etc/sysctl.d/99-kubernetes.conf
        mode: '0644'

    - name: Apply sysctl
      command: sysctl --system
      changed_when: false

    # Containerd
    - name: Add Docker CE repo
      shell: dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
      args:
        creates: /etc/yum.repos.d/docker-ce.repo

    - name: Install containerd
      dnf:
        name: containerd.io
        state: present
#===
    - name: Generate default containerd config
      command: containerd config default
      register: containerd_config

    - name: Write containerd config.toml with SystemdCgroup enabled
      copy:
        dest: /etc/containerd/config.toml
        content: "{{ containerd_config.stdout | regex_replace('SystemdCgroup = false', 'SystemdCgroup = true') }}"

#===
    - name: reload daemon
      command: systemctl daemon-reload 

    - name: Restart containerd
      systemd:
        name: containerd
        state: restarted
        enabled: yes
#======
- name: Kubernetes packages + Firewall
  hosts: all
  become: yes
  tasks:
    - name: Add Kubernetes repo
      yum_repository:
        name: kubernetes
        description: Kubernetes
        baseurl: https://pkgs.k8s.io/core:/stable:/v1.30/rpm/
        enabled: yes
        gpgcheck: yes
        gpgkey: https://pkgs.k8s.io/core:/stable:/v1.30/rpm/repodata/repomd.xml.key

    - name: Install Kubernetes packages
      dnf:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present

    - name: Enable kubelet
      systemd:
        name: kubelet
        enabled: yes
        state: started

    # Firewall
    - name: Open common ports on all nodes
      command: firewall-cmd --permanent --add-port={{ item }}
      loop:
        - 10250/tcp
        - 8472/udp
      changed_when: false

- name: Reset and Initialize Master
  hosts: masters
  become: yes
  tasks:
    - name: Reset previous Kubernetes installation
      command: kubeadm reset -f
      ignore_errors: yes
      changed_when: true

    - name: Clean up old directories
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/kubernetes
        - /var/lib/etcd
        - /var/lib/kubelet
        - /root/.kube

    - name: Open control plane ports
      command: firewall-cmd --permanent --add-port={{ item }}
      loop:
        - 6443/tcp
        - 2379-2380/tcp
        - 10259/tcp
        - 10257/tcp
      changed_when: false

    - name: Reload firewalld
      command: firewall-cmd --reload
      changed_when: false

    - name: Initialize Kubernetes cluster
      command: >
        kubeadm init
        --pod-network-cidr=10.244.0.0/16
        --cri-socket=unix:///run/containerd/containerd.sock
        --apiserver-advertise-address={{ ansible_host }}
      register: kubeadm_init
      changed_when: true
        #=================
    - name: Create .kube directory for root
      file:
        path: /root/.kube
        state: directory
        mode: '0755'

    - name: Copy admin kubeconfig for root
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /root/.kube/config
        remote_src: yes
        mode: '0600'

    - name: Ensure kubeconfig for current user
      become: false
      block:
        - name: Create .kube directory for user
          file:
            path: "{{ lookup('env','HOME') }}/.kube"
            state: directory
            mode: '0755'

        - name: Copy admin kubeconfig to user home
          copy:
            src: /etc/kubernetes/admin.conf
            dest: "{{ lookup('env','HOME') }}/.kube/config"
            remote_src: yes
            mode: '0600'

        - name: Fix ownership of kubeconfig
          file:
            path: "{{ lookup('env','HOME') }}/.kube/config"
            owner: "{{ lookup('env','USER') }}"
            group: "{{ lookup('env','USER') }}"
            mode: '0600'        
              #==========
    - name: Install Flannel CNI
      command: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
      changed_when: false

    - name: Generate join command
      command: kubeadm token create --print-join-command
      register: join_command

    - name: Save join command locally
      local_action:
        module: copy
        content: "{{ join_command.stdout }}"
        dest: ./join-command.sh
      become: false

- name: Join Worker Nodes
  hosts: workers
  become: yes
  tasks:
    - name: Reset worker first (if previously joined)
      command: kubeadm reset -f
      ignore_errors: yes

    - name: Copy join command
      copy:
        src: ./join-command.sh
        dest: /tmp/join-command.sh
        mode: '0755'

    - name: Join worker to cluster
      command: sh /tmp/join-command.sh
      changed_when: true
